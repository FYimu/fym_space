- id: "cs5234"
  level: "undergraduate"
  code: "CS5234"
  name: "Algorithms at Scale"
  term: "AY24/25 Sem 1 | Prof. Diptarka Chakraborty"
  grade: "A+"
  diff: "3/5"
  enjoy: "5/5"
  useful: "5/5"
  overview: "This course focuses on designing efficient approximation algorithms for large-scale streaming data with approximation guarantees. Although the pre-requisite for this course is CS3230, I feel that they are not very closely related (maybe loosely related in the sense of graphs like spanning trees which are also taught in CS2040). I would recommend taking this course after taking ST2131 or ST2334 because analysing performance guarantee requires some familiarity with probability. One of the top courses I've taken as an undergrad. I am not really an algo person, but the motivations for streaming algorithms and how they can be applied in real life are very clear, which make this course extremely eye-opening. Absolutely recommended."
  assessment: |
    * Assignments ×2 (20%)
    * Quiz 1 (20%)
    * Quiz 2 (20%)
    * Final Project (35%: 15% presentation, 15% report, 5% reviewing peers' presentations)
