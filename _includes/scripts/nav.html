<script>
document.addEventListener('DOMContentLoaded', () => {
  function highlightTarget(target) {
    if (!target) return;

    document.querySelectorAll('.pub-highlight').forEach(el => el.classList.remove('pub-highlight'));

    setTimeout(() => {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.classList.add('pub-highlight');
      target.addEventListener('animationend', () => {
        target.classList.remove('pub-highlight');
      }, { once: true });
    }, 100);
  }

  document.addEventListener('click', (e) => {
    const arrow = e.target.closest('.js-update-link');
    if (!arrow) return;

    const url = new URL(arrow.href, window.location.href);
    const target = url.hash ? document.getElementById(url.hash.slice(1)) : null;
    if (url.pathname === window.location.pathname && target) {
      e.preventDefault();
      history.pushState(null, null, url.hash);
      highlightTarget(target);
    }
  });

  if (window.location.hash) {
    highlightTarget(document.getElementById(window.location.hash.slice(1)));
  }
});

document.addEventListener('DOMContentLoaded', () => {
  const toggleBtn = document.getElementById('toggle-updates-btn');
  const updatesList = document.getElementById('updates-list');

  if (toggleBtn && updatesList) {
    const setMobileUpdatesHeight = () => {
      if (window.matchMedia('(max-width: 640px)').matches) {
        const wasExpanded = updatesList.classList.contains('is-expanded');
        if (wasExpanded) {
          updatesList.classList.remove('is-expanded');
        }

        updatesList.style.setProperty('--updates-scroll-height', `${updatesList.offsetHeight}px`);

        if (wasExpanded) {
          updatesList.classList.add('is-expanded');
        }
      } else {
        updatesList.style.removeProperty('--updates-scroll-height');
      }
    };

    toggleBtn.addEventListener('click', () => {
      if (!updatesList.classList.contains('is-expanded')) {
        setMobileUpdatesHeight();
      }

      const isExpanded = updatesList.classList.toggle('is-expanded');
      toggleBtn.textContent = isExpanded ? 'Show Less' : 'Show More';

      if (!isExpanded) {
        updatesList.style.removeProperty('--updates-scroll-height');
        document.querySelector('.updates-header')?.scrollIntoView({ behavior: 'smooth' });
      }
    });

    window.addEventListener('resize', () => {
      if (updatesList.classList.contains('is-expanded')) {
        setMobileUpdatesHeight();
      }
    });
  }
});
</script>
