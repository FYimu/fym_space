<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ site.title }}</title>
<script>
  (function () {
    var section = window.location.hash.slice(1) || 'about';
    var validSections = ['about', 'education', 'publications', 'teaching', 'courses', 'hobbies'];
    document.documentElement.dataset.initialSection = validSections.indexOf(section) === -1 ? 'about' : section;
  }());
</script>
