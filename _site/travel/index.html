  <script>
document.addEventListener('DOMContentLoaded', () => {
  const sections = document.querySelectorAll('.section');
  const navLinks = document.querySelectorAll('nav a');

  function showSection(id) {
    if (!id) return;
    const targetSection = document.getElementById(id);
    if (!targetSection) return;

    delete document.documentElement.dataset.initialSection;
    sections.forEach(s => s.classList.remove('active'));
    navLinks.forEach(a => a.classList.remove('active'));
    
    targetSection.classList.add('active');
    const link = document.querySelector(`nav a[data-section="${id}"]`);
    if (link) link.classList.add('active');
  }

  // 1. Sidebar Navigation
  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      const sectionId = link.getAttribute('data-section');
      if (document.getElementById(sectionId)) {
        e.preventDefault();
        showSection(sectionId);
        history.pushState(null, null, '#' + sectionId);
      }
    });
  });

  // 2. Update Arrow Logic (With Self-Cleaning Highlight)
  document.addEventListener('click', (e) => {
    const arrow = e.target.closest('.js-update-link');
    if (!arrow) return;

    const href = arrow.getAttribute('href');
    if (!href.includes('#')) return;

    const parts = href.split('#'); 
    const sectionId = parts[1]; 
    const paperId = parts[2];   

    const targetSection = document.getElementById(sectionId);
    if (targetSection) {
      e.preventDefault();
      showSection(sectionId);
      history.pushState(null, null, '#' + (paperId || sectionId));

      if (paperId) {
        const paperElement = document.getElementById(paperId);
        if (paperElement) {
          // WIPE: Remove highlight from any other items immediately
          document.querySelectorAll('.pub-highlight').forEach(el => el.classList.remove('pub-highlight'));

          setTimeout(() => {
            paperElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // ADD HIGHLIGHT
            paperElement.classList.add('pub-highlight');

            // SELF-CLEAN: Remove the class as soon as the animation finishes
            paperElement.addEventListener('animationend', () => {
              paperElement.classList.remove('pub-highlight');
            }, { once: true }); // { once: true } ensures the listener cleans itself up too
          }, 100);
        }
      }
    }
  });

  // 3. Handle Page Load
  const hash = window.location.hash.substring(1);
  if (hash) {
    const targetItem = document.getElementById(hash);
    if (targetItem) {
      if (targetItem.classList.contains('section')) {
        showSection(hash);
        return;
      }

      const parentSection = targetItem.closest('.section');
      if (parentSection) {
        showSection(parentSection.id);
        setTimeout(() => {
          targetItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
          targetItem.classList.add('pub-highlight');
          targetItem.addEventListener('animationend', () => {
            targetItem.classList.remove('pub-highlight');
          }, { once: true });
        }, 600);
      }
    }
  } else {
    showSection('about');
  }
});


document.addEventListener('DOMContentLoaded', () => {
  const toggleBtn = document.getElementById('toggle-updates-btn');
  const updatesList = document.getElementById('updates-list');

  if (toggleBtn && updatesList) {
    toggleBtn.addEventListener('click', () => {
      const isExpanded = updatesList.classList.toggle('is-expanded');
      
      // Update button text
      toggleBtn.textContent = isExpanded ? 'Show Less' : 'Show More';
      
      // Optional: If collapsing, scroll back up to the updates header
      if (!isExpanded) {
        document.querySelector('.updates-header').scrollIntoView({ behavior: 'smooth' });
      }
    });
  }
});
</script>
